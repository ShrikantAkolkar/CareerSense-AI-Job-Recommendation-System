<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - CareerSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', Arial, sans-serif; background: #f6f8fa; margin: 0; padding: 0; }
        .profile-container { max-width: 500px; margin: 60px auto; background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 36px 32px; }
        h2 { color: #2563eb; text-align: center; margin-bottom: 24px; }
        .field { margin-bottom: 16px; }
        .field strong { color: #2563eb; width: 120px; display: inline-block; }
        .logout-link { display: inline-block; margin-top: 18px; color: #d7263d; text-decoration: none; font-weight: 600; }
        .logout-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="profile-container">
        {% if profile.photo %}
            <img src="{{ profile.photo.url }}" alt="Profile Photo" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:18px;">
        {% endif %}
        <h2>Your Profile</h2>
        <div class="field"><strong>Username:</strong> {{ user.username }}</div>
        <div class="field"><strong>Email:</strong> {{ user.email }}</div>
        <div class="field"><strong>First Name:</strong> {{ user.first_name }}</div>
        <div class="field"><strong>Last Name:</strong> {{ user.last_name }}</div>
        <div class="field"><strong>Bio:</strong> {{ profile.bio }}</div>
        <div class="field"><strong>Phone:</strong> {{ profile.phone }}</div>
        <a href="/profile/update/" class="logout-link" style="color:#2563eb;">Edit Profile</a>
        <a href="/logout/" class="logout-link">Logout</a>
    </div>
    {% if profile.photo %}
    <img src="{{ profile.photo.url }}" width="150" height="150">
{% endif %}
</body>
</html>
